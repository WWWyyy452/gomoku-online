app = "gomoku"
primary_region = "sin"

[build]
  builder = "heroku/buildpacks:20"

[env]
  PYTHON_VERSION = "3.11.11"

[[services]]
  internal_port = 8080
  protocol = "tcp"
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[services.ports]]
    handlers = ["http"]
    port = 80

  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443

[[vm]]
  size = "shared-cpu-1x"
  memory_mb = 256
