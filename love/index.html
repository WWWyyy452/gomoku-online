<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Love</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif}

canvas#heart{position:fixed;top:0;left:0;z-index:0}

.center-text{position:relative;z-index:1;text-align:center;pointer-events:none}
.center-text h1{font-size:48px;color:#ff4081;text-shadow:0 0 20px rgba(255,64,129,0.8),0 0 40px rgba(255,64,129,0.4);animation:pulse 2s ease-in-out infinite;letter-spacing:4px}
.center-text p{font-size:18px;color:#ff80ab;margin-top:16px;opacity:0.8}

@keyframes pulse{0%,100%{transform:scale(1);text-shadow:0 0 20px rgba(255,64,129,0.8)}50%{transform:scale(1.05);text-shadow:0 0 30px rgba(255,64,129,1),0 0 60px rgba(255,64,129,0.6)}}

.floating-heart{position:fixed;pointer-events:none;z-index:0;animation:floatUp linear forwards}
@keyframes floatUp{
  0%{opacity:1;transform:translateY(0) scale(1) rotate(0deg)}
  100%{opacity:0;transform:translateY(-100vh) scale(0.3) rotate(720deg)}
}

.click-hint{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);z-index:1;color:rgba(255,255,255,0.4);font-size:14px;animation:blink 2s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:0.4}50%{opacity:0.8}}
</style>
</head>
<body>

<canvas id="heart"></canvas>

<div class="center-text">
  <h1>I ❤️ YOU</h1>
  <p>点击屏幕，释放爱心</p>
</div>

<div class="click-hint">~ 点击任意位置 ~</div>

<script>
// ═══ 爱心粒子背景 ═══
const canvas = document.getElementById('heart');
const ctx = canvas.getContext('2d');
let W, H;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// 爱心粒子
class HeartParticle {
  constructor() {
    this.reset();
  }
  reset() {
    this.x = Math.random() * W;
    this.y = H + Math.random() * 100;
    this.size = Math.random() * 15 + 5;
    this.speedY = Math.random() * 1.5 + 0.5;
    this.speedX = (Math.random() - 0.5) * 0.8;
    this.opacity = Math.random() * 0.5 + 0.3;
    this.hue = Math.random() * 30 + 330; // 粉红色系
    this.rotation = Math.random() * Math.PI * 2;
    this.rotSpeed = (Math.random() - 0.5) * 0.02;
  }
  update() {
    this.y -= this.speedY;
    this.x += this.speedX + Math.sin(this.y * 0.01) * 0.3;
    this.rotation += this.rotSpeed;
    if (this.y < -50) this.reset();
  }
  draw() {
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.rotation);
    ctx.globalAlpha = this.opacity;
    ctx.fillStyle = `hsl(${this.hue}, 100%, 65%)`;
    ctx.shadowColor = `hsl(${this.hue}, 100%, 65%)`;
    ctx.shadowBlur = 15;
    this.drawHeart(0, 0, this.size);
    ctx.restore();
  }
  drawHeart(x, y, s) {
    ctx.beginPath();
    ctx.moveTo(x, y + s * 0.3);
    ctx.bezierCurveTo(x, y, x - s, y, x - s, y + s * 0.3);
    ctx.bezierCurveTo(x - s, y + s * 0.7, x, y + s, x, y + s * 1.2);
    ctx.bezierCurveTo(x, y + s, x + s, y + s * 0.7, x + s, y + s * 0.3);
    ctx.bezierCurveTo(x + s, y, x, y, x, y + s * 0.3);
    ctx.fill();
  }
}

const particles = [];
for (let i = 0; i < 50; i++) {
  particles.push(new HeartParticle());
}

function animate() {
  ctx.clearRect(0, 0, W, H);
  for (const p of particles) {
    p.update();
    p.draw();
  }
  requestAnimationFrame(animate);
}
animate();

// ═══ 点击爆发爱心 ═══
function spawnBurst(x, y) {
  const count = 12;
  for (let i = 0; i < count; i++) {
    const angle = (Math.PI * 2 / count) * i + Math.random() * 0.5;
    const speed = Math.random() * 4 + 2;
    const el = document.createElement('div');
    el.className = 'floating-heart';
    el.innerHTML = '❤';
    const size = Math.random() * 20 + 14;
    el.style.cssText = `
      left:${x}px; top:${y}px;
      font-size:${size}px;
      color:hsl(${Math.random()*30+330}, 100%, 60%);
      text-shadow:0 0 10px hsl(${Math.random()*30+330},100%,60%);
      animation-duration:${Math.random()*2+2}s;
      transform:translate(-50%,-50%);
    `;
    document.body.appendChild(el);

    // 物理抛物线
    const vx = Math.cos(angle) * speed * 80;
    const vy = Math.sin(angle) * speed * 80 - 100;
    let px = 0, py = 0, t = 0;
    const anim = setInterval(() => {
      t += 0.016;
      px += vx * 0.016;
      py += (vy + 300 * t) * 0.016;
      el.style.transform = `translate(calc(-50% + ${px}px), calc(-50% + ${py}px)) rotate(${t*180}deg)`;
      if (t > 3) { clearInterval(anim); el.remove(); }
    }, 16);

    setTimeout(() => el.remove(), 4000);
  }
}

document.addEventListener('click', (e) => {
  spawnBurst(e.clientX, e.clientY);
});
document.addEventListener('touchstart', (e) => {
  for (const t of e.touches) {
    spawnBurst(t.clientX, t.clientY);
  }
}, {passive:true});

// ═══ 自动随机爱心 ═══
setInterval(() => {
  if (Math.random() < 0.3) {
    spawnBurst(Math.random() * W, Math.random() * H * 0.5 + H * 0.3);
  }
}, 2000);
</script>
</body>
</html>
